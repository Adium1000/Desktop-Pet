<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Desktop Pet Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --md-primary: #006A6A;
    --md-on-primary: #ffffff;
    --md-primary-container: #9CF1F0;
    --md-on-primary-container: #002020;
    --md-secondary: #4A6363;
    --md-secondary-container: #CCE8E7;
    --md-on-secondary-container: #051F1F;
    --md-tertiary: #4B607C;
    --md-tertiary-container: #D3E4FF;
    --md-surface: #F4FAFA;
    --md-surface-variant: #DAE5E4;
    --md-on-surface: #161D1D;
    --md-on-surface-variant: #3F4948;
    --md-outline: #6F797A;
    --md-outline-variant: #BEC9C8;
    --md-surface-1: #EBF4F3;
    --md-surface-2: #E3F0EF;
    --md-surface-3: #DAECEb;
    --md-surface-tint: rgba(0,106,106,0.08);
    --md-error: #BA1A1A;
    --md-shadow: rgba(0,0,0,0.12);
    --elev-1: 0 1px 2px rgba(0,0,0,0.10), 0 1px 3px 1px rgba(0,0,0,0.07);
    --elev-2: 0 1px 2px rgba(0,0,0,0.10), 0 2px 6px 2px rgba(0,0,0,0.08);
    --elev-3: 0 4px 8px 3px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
    --md-primary: #4DD9D8;
    --md-on-primary: #003737;
    --md-primary-container: #004F4F;
    --md-on-primary-container: #9CF1F0;
    --md-secondary: #B0CCCC;
    --md-secondary-container: #314B4B;
    --md-on-secondary-container: #CCE8E7;
    --md-tertiary: #AFC6E9;
    --md-tertiary-container: #334869;
    --md-surface: #0E1414;
    --md-surface-variant: #3F4948;
    --md-on-surface: #DDE4E3;
    --md-on-surface-variant: #BEC9C8;
    --md-outline: #899392;
    --md-outline-variant: #3F4948;
    --md-surface-1: #161E1E;
    --md-surface-2: #1A2424;
    --md-surface-3: #1E2929;
    --md-surface-tint: rgba(77,217,216,0.08);
    --md-error: #FFB4AB;
    --md-shadow: rgba(0,0,0,0.4);
    --elev-1: 0 1px 2px rgba(0,0,0,0.30), 0 1px 3px 1px rgba(0,0,0,0.20);
    --elev-2: 0 1px 2px rgba(0,0,0,0.30), 0 2px 6px 2px rgba(0,0,0,0.25);
    --elev-3: 0 4px 8px 3px rgba(0,0,0,0.25), 0 1px 3px rgba(0,0,0,0.35);
    }
  }
  :root {
    --motion-standard: cubic-bezier(0.2, 0, 0, 1);
    --motion-emphasized: cubic-bezier(0.3, 0, 0, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--md-surface);
    color: var(--md-on-surface);
    font-family: 'Google Sans', 'Roboto', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0;
    overflow-x: hidden;
  }
  .top-app-bar {
    width: 100%;
    background: var(--md-surface-1);
    box-shadow: var(--elev-1);
    padding: 12px 16px 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .top-app-bar .app-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--md-primary-container);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .top-app-bar .titles {
    flex: 1;
  }
  .top-app-bar h1 {
    font-family: 'Google Sans Display', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--md-on-surface);
    letter-spacing: 0;
    line-height: 1.2;
  }
  .top-app-bar .subtitle {
    font-size: 12px;
    color: var(--md-on-surface-variant);
    font-family: 'Roboto Mono', monospace;
    letter-spacing: 0.5px;
    margin-top: 1px;
  }
  .content {
    width: 100%;
    max-width: 480px;
    padding: 16px 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .md-card {
    background: var(--md-surface-1);
    border-radius: 28px;
    box-shadow: var(--elev-1);
    overflow: hidden;
    transition: box-shadow 200ms var(--motion-standard);
  }
  .md-card:hover { box-shadow: var(--elev-2); }
  .display-card {
    background: var(--md-surface-2);
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    border-radius: 28px;
    box-shadow: var(--elev-2);
  }
  .display-card-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .display-card-header .label {
    font-size: 11px;
    font-family: 'Roboto Mono', monospace;
    color: var(--md-on-surface-variant);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .display-card-header .chip {
    background: var(--md-primary-container);
    color: var(--md-on-primary-container);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: 'Roboto Mono', monospace;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .screen-container {
    position: relative;
    border-radius: 16px;
    background: #000;
    padding: 10px;
    box-shadow:
      0 0 0 1.5px rgba(0,0,0,0.3),
      0 8px 24px rgba(0,0,0,0.35),
      inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  .screen-container::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 1;
  }
  canvas {
    display: block;
    border-radius: 6px;
    image-rendering: pixelated;
    position: relative;
    z-index: 0;
  }
  .state-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--md-secondary-container);
    border-radius: 100px;
    padding: 6px 14px 6px 10px;
    transition: all 250ms var(--motion-standard);
  }
  .state-chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--md-primary);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }
  .state-chip span {
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--md-on-secondary-container);
    letter-spacing: 0.5px;
  }
  .hold-progress-wrap {
    width: 100%;
    height: 4px;
    background: var(--md-outline-variant);
    border-radius: 4px;
    overflow: hidden;
  }
  .hold-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--md-primary), var(--md-tertiary));
    border-radius: 4px;
    transition: none;
  }
  .fab-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .fab-touch {
    position: relative;
    border-radius: 16px;
    background: var(--md-primary-container);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 40px;
    box-shadow: var(--elev-3);
    transition: all 180ms var(--motion-emphasized);
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .fab-touch .fab-label {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--md-on-primary-container);
    text-transform: uppercase;
  }
  .fab-touch::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--md-primary);
    opacity: 0;
    border-radius: inherit;
    transition: opacity 200ms;
  }
  .fab-touch:active::after,
  .fab-touch.pressed::after {
    opacity: 0.12;
  }
  .fab-touch:active,
  .fab-touch.pressed {
    transform: scale(0.97);
    box-shadow: var(--elev-1);
    background: var(--md-primary-container);
  }
  .info-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .info-card {
    background: var(--md-surface-variant);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .info-card .info-label {
    font-size: 11px;
    color: var(--md-on-surface-variant);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .info-card .info-value {
    font-family: 'Roboto Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--md-on-surface);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .instructions-card {
    background: var(--md-tertiary-container);
    border-radius: 20px;
    padding: 16px 20px;
  }
  .instructions-card .instr-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--md-on-surface);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .instructions-card .instr-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
  }
  .instructions-card .instr-badge {
    background: rgba(75,96,124,0.18);
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 11px;
    font-family: 'Roboto Mono', monospace;
    font-weight: 600;
    color: var(--md-tertiary);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 60px;
    text-align: center;
  }
  .instructions-card .instr-desc {
    font-size: 12px;
    color: var(--md-on-surface-variant);
    line-height: 1.4;
  }
  .bottom-hint {
    width: 100%;
    display: flex;
    justify-content: center;
    padding-top: 4px;
  }
  .bottom-hint .home-pill {
    width: 48px;
    height: 5px;
    background: var(--md-outline-variant);
    border-radius: 3px;
  }
  .press-feedback {
    font-size: 12px;
    font-family: 'Roboto Mono', monospace;
    color: var(--md-on-surface-variant);
    letter-spacing: 0.5px;
    text-align: center;
    min-height: 18px;
    transition: color 200ms;
  }
  .press-feedback.active {
    color: var(--md-primary);
  }
</style>
</head>
<body>
<div class="top-app-bar">
  <div class="titles">
    <h1>Desktop Pet</h1>
    <div class="subtitle">Oled Explorer</div>
  </div>
</div>
<div class="content">
  <div class="md-card display-card">
    <div class="screen-container">
      <canvas id="oled" width="256" height="128"></canvas>
    </div>
    <div style="width:100%; display:flex; flex-direction:column; align-items:center; gap:16px;">
      <div class="hold-progress-wrap">
        <div class="hold-bar" id="holdBar"></div>
      </div>
      <div class="fab-section">
        <div class="fab-touch" id="touchBtn"
          onmousedown="touchDown()" onmouseup="touchUp()" onmouseleave="touchUp()">
          <span class="fab-label">TOUCH</span>
        </div>
      </div>
    </div>
  </div>
</div>
<span id="stateBadge" style="display:none"></span>
<span id="infoState" style="display:none"></span>
<span id="infoPressType" style="display:none"></span>
<script>
const SCALE = 2;
const W = 128, H = 64;
const canvas = document.getElementById('oled');
const ctx = canvas.getContext('2d');
let pixBuf = new Uint8Array(W * H);
function pset(x, y, v) {
  if (x < 0 || x >= W || y < 0 || y >= H) return;
  pixBuf[y * W + x] = v ? 1 : 0;
}
function pget(x, y) {
  if (x < 0 || x >= W || y < 0 || y >= H) return 0;
  return pixBuf[y * W + x];
}
function clearBuf() { pixBuf.fill(0); }
function flushDisplay() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W * SCALE, H * SCALE);
  ctx.fillStyle = '#00e5ff';
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (pixBuf[y * W + x]) {
        ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
      }
    }
  }
}
function drawPixel(x, y, c) { pset(x, y, c); }
function fillRect(x, y, w, h, c) {
  for (let dy = 0; dy < h; dy++)
    for (let dx = 0; dx < w; dx++)
      pset(x+dx, y+dy, c);
}
function drawRect(x, y, w, h, c) {
  for (let dx = 0; dx < w; dx++) { pset(x+dx, y, c); pset(x+dx, y+h-1, c); }
  for (let dy = 0; dy < h; dy++) { pset(x, y+dy, c); pset(x+w-1, y+dy, c); }
}
function drawLine(x0, y0, x1, y1, c) {
  let dx = Math.abs(x1-x0), dy = Math.abs(y1-y0);
  let sx = x0<x1?1:-1, sy = y0<y1?1:-1;
  let err = dx - dy;
  while(true) {
    pset(x0, y0, c);
    if (x0===x1 && y0===y1) break;
    let e2 = 2*err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 <  dx) { err += dx; y0 += sy; }
  }
}
function drawCircle(cx, cy, r, c) {
  let x = r, y = 0, err = 0;
  while (x >= y) {
    pset(cx+x,cy+y,c); pset(cx+y,cy+x,c);
    pset(cx-y,cy+x,c); pset(cx-x,cy+y,c);
    pset(cx-x,cy-y,c); pset(cx-y,cy-x,c);
    pset(cx+y,cy-x,c); pset(cx+x,cy-y,c);
    y++; err += 1+2*y;
    if (2*(err-x)+1 > 0) { x--; err += 1-2*x; }
  }
}
function fillCircle(cx, cy, r, c) {
  for (let dy = -r; dy <= r; dy++)
    for (let dx = -r; dx <= r; dx++)
      if (dx*dx+dy*dy <= r*r) pset(cx+dx, cy+dy, c);
}
function fillRoundRect(x, y, w, h, r, c) {
  fillRect(x+r, y, w-2*r, h, c);
  fillRect(x, y+r, r, h-2*r, c);
  fillRect(x+w-r, y+r, r, h-2*r, c);
  fillCircle(x+r, y+r, r, c);
  fillCircle(x+w-1-r, y+r, r, c);
  fillCircle(x+r, y+h-1-r, r, c);
  fillCircle(x+w-1-r, y+h-1-r, r, c);
}
function drawRoundRect(x, y, w, h, r, c) {
  drawLine(x+r, y, x+w-1-r, y, c);
  drawLine(x+r, y+h-1, x+w-1-r, y+h-1, c);
  drawLine(x, y+r, x, y+h-1-r, c);
  drawLine(x+w-1, y+r, x+w-1, y+h-1-r, c);
  let cx0=x+r, cy0=y+r, cx1=x+w-1-r, cy1=y+h-1-r;
  let xi=r,yi=0,err=0;
  while(xi>=yi){
    pset(cx1+xi,cy0-yi,c); pset(cx1+yi,cy0-xi,c);
    pset(cx0-yi,cy0-xi,c); pset(cx0-xi,cy0-yi,c);
    pset(cx0-xi,cy1+yi,c); pset(cx0-yi,cy1+xi,c);
    pset(cx1+yi,cy1+xi,c); pset(cx1+xi,cy1+yi,c);
    yi++; err+=1+2*yi;
    if(2*(err-xi)+1>0){xi--;err+=1-2*xi;}
  }
}
function fillTriangle(x0,y0,x1,y1,x2,y2,c) {
  let pts = [[x0,y0],[x1,y1],[x2,y2]].sort((a,b)=>a[1]-b[1]);
  let [ax,ay]=[pts[0][0],pts[0][1]],[bx,by]=[pts[1][0],pts[1][1]],[cx2,cy2]=[pts[2][0],pts[2][1]];
  function interp(y,x0,y0,x1,y1){
    if(y1===y0) return x0;
    return x0+(x1-x0)*(y-y0)/(y1-y0);
  }
  for(let y=ay;y<=cy2;y++){
    let xa=Math.round(interp(y,ax,ay,cx2,cy2));
    let xb=y<by?Math.round(interp(y,ax,ay,bx,by)):Math.round(interp(y,bx,by,cx2,cy2));
    if(xa>xb){let t=xa;xa=xb;xb=t;}
    for(let x=xa;x<=xb;x++) pset(x,y,c);
  }
}

function updatePong() {
  if(pongLost) return;
  let aiSpeed=2;
  if(aiY<ballY-2) aiY=Math.min(aiY+aiSpeed,62-Math.floor(PAD_H/2));
  if(aiY>ballY+2) aiY=Math.max(aiY-aiSpeed,2+Math.floor(PAD_H/2));
  ballX+=ballDX;ballY+=ballDY;
  if(ballY<=2){ballY=2;ballDY=Math.abs(ballDY);}
  if(ballY>=62){ballY=62;ballDY=-Math.abs(ballDY);}
  if(ballX<=6&&ballDX<0){if(ballY>=playerY-PAD_H/2-3&&ballY<=playerY+PAD_H/2+3){ballX=7;ballDX=Math.min(Math.abs(ballDX)*1.04,4.5);ballDY+=(Math.random()-0.5)*1.2;}}
  if(ballX>=122&&ballDX>0){if(ballY>=aiY-PAD_H/2-3&&ballY<=aiY+PAD_H/2+3){ballX=121;ballDX=-Math.min(Math.abs(ballDX)*1.04,4.5);ballDY+=(Math.random()-0.5)*1.2;}}
  if(ballX>128){pongScore++;ballX=64;ballY=32;ballDX=-2.2;ballDY=1.5;}
  if(ballX<0){pongLost=true;}
  if(paddleGoingDown){playerY+=2;if(playerY+PAD_H/2>=62){playerY=62-PAD_H/2;paddleGoingDown=false;}}
  else{playerY-=2;if(playerY-PAD_H/2<=2){playerY=2+PAD_H/2;paddleGoingDown=true;}}
}
function xoReset() { xoBoard=new Uint8Array(9);xoCursor=0;xoGameOver=false;xoWinner=0;xoPlayerTurn=true;xoAiThinking=false; }
function xoCheckWinner() {
  const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let l of lines){let [a,b,c]=l;if(xoBoard[a]&&xoBoard[a]===xoBoard[b]&&xoBoard[b]===xoBoard[c]) return xoBoard[a];}
  let full=true;for(let i=0;i<9;i++) if(!xoBoard[i]){full=false;break;}
  return full?3:0;
}
function xoAiMove() {
  const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let l of lines){let cntO=0,emptyIdx=-1;for(let j of l){if(xoBoard[j]===2)cntO++;else if(xoBoard[j]===0)emptyIdx=j;}if(cntO===2&&emptyIdx>=0) return emptyIdx;}
  for(let l of lines){let cntX=0,emptyIdx=-1;for(let j of l){if(xoBoard[j]===1)cntX++;else if(xoBoard[j]===0)emptyIdx=j;}if(cntX===2&&emptyIdx>=0) return emptyIdx;}
  if(!xoBoard[4]) return 4;
  for(let c of [0,2,6,8]) if(!xoBoard[c]) return c;
  for(let i=0;i<9;i++) if(!xoBoard[i]) return i;
  return -1;
}

);flushDisplay();}}

  else if(mode===13){if(now-ssEqLast>80){ssEqLast=now;clearBuf();for(let i=0;i<16;i++){if(ssEqH[i]<ssEqTarget[i])ssEqH[i]+=rnd(1,4);else if(ssEqH[i]>ssEqTarget[i])ssEqH[i]-=rnd(1,3);if(Math.abs(ssEqH[i]-ssEqTarget[i])<3)ssEqTarget[i]=rnd(2,50);let h2=Math.max(2,Math.min(ssEqH[i],50));fillRect(i*8+1,62-h2,6,h2,1);if(62-h2>=2)drawLine(i*8+1,62-h2-2,i*8+6,62-h2-2,1);}drawLine(0,63,127,63,1);flushDisplay();}}

let lastBlinkTime=0;
function mainLoop() {
  const now = Date.now();
  if (inScreenOff) { return; }
  if (inFaceManager) { drawFaceManager(); return; }
  if (inMediaMenu) { drawMediaMenu(); return; }
  if (inSettingsMenu) { drawSettingsMenu(); return; }
  if (inSensors) {
    if(now-lastUpdate>2000){currentTemp=20+Math.random()*15;currentPressure=1000+rnd(0,40);lastUpdate=now;}
    drawSensors(); return;
  }
  if (inStopwatch) { drawStopwatch(); return; }
  if (inPong) { updatePong(); drawPong(); return; }
  if (inXO) {
    if(xoAiThinking&&!xoGameOver&&now>=xoAiDelay){
      xoAiThinking=false;let mv=xoAiMove();
      if(mv>=0){xoBoard[mv]=2;xoWinner=xoCheckWinner();
        if(xoWinner)xoGameOver=true;else{xoPlayerTurn=true;xoCursor=0;while(xoCursor<9&&xoBoard[xoCursor])xoCursor++;}}
    }
    drawXO(); return;
  }
  if (inScreensaver) {
    if(ssSelecting){drawScreensaverSelection();}
    else{updateDrawScreensaver(screensaverMode);}
    return;
  }
  if (menuState === 0) {
    clearBuf();
    if (Math.abs(currentX-targetX)>0.5||Math.abs(currentY-targetY)>0.5) {
      currentX+=(targetX-currentX)*0.1;currentY+=(targetY-currentY)*0.1;
    } else if (now-lastUpdate>3000) {
      targetX=rnd(-10,11);targetY=rnd(-6,7);lastUpdate=now;
    }
    drawEyeShape(baseLeftX+Math.round(currentX), baseY+Math.round(currentY), eyeHeight);
    drawEyeShape(baseRightX+Math.round(currentX), baseY+Math.round(currentY), eyeHeight);
    drawFaceExtras(0);
    if(eyeExpression===0&&now-lastBlinkTime>(8000+rnd(0,4000))){
      lastBlinkTime=now;
      for(let h=eyeHeight;h>=2;h-=12){clearBuf();drawEyeShape(baseLeftX+Math.round(currentX),baseY+Math.round(currentY),h);drawEyeShape(baseRightX+Math.round(currentX),baseY+Math.round(currentY),h);flushDisplay();}
      for(let h=2;h<=eyeHeight;h+=12){clearBuf();drawEyeShape(baseLeftX+Math.round(currentX),baseY+Math.round(currentY),h);drawEyeShape(baseRightX+Math.round(currentX),baseY+Math.round(currentY),h);flushDisplay();}
    }
    flushDisplay();
  } else if (menuState === 1) {
    clearBuf();
    drawLauncherTile(launcherTile, launcherApp, 0);
    flushDisplay();
  }
}
clearBuf();
drawEyeShape(baseLeftX, baseY, eyeHeight);
drawEyeShape(baseRightX, baseY, eyeHeight);
flushDisplay();
updateBadge();
setInterval(mainLoop, 33);
const _btn = document.getElementById('touchBtn');
_btn.addEventListener('touchstart', function(e) { e.preventDefault(); touchDown(); }, { passive: false });
_btn.addEventListener('touchend',   function(e) { e.preventDefault(); touchUp();   }, { passive: false });
_btn.addEventListener('touchcancel',function(e) { e.preventDefault(); touchUp();   }, { passive: false });
document.addEventListener('keydown', e => { if(e.code==='Space'||e.code==='Enter'){e.preventDefault();touchDown();} });
document.addEventListener('keyup',   e => { if(e.code==='Space'||e.code==='Enter'){e.preventDefault();touchUp();} });
